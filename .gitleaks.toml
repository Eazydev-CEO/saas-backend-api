# gitleaks configuration
#
# The default rule set is kept in full. The allowlist below exempts one literal
# value that is public by design. Nothing here is, or has ever been, a real
# credential.
#
# Rule of thumb for changing this file: if a value could ever protect real data,
# it does not belong in an allowlist — rotate it instead.
#
# Why one `[allowlist]` table (and not `[[allowlists]]`): the plural,
# array-of-tables form is only understood by newer gitleaks releases. Older
# versions parse the file, silently ignore the unknown key, and report the
# allowlisted value as a leak. The singular form is understood by every 8.x
# release, so this config behaves identically in CI and on a developer machine.
# Matching is done on the literal value rather than a path so that moving the
# file cannot silently widen the exemption.

title = "SaaS Backend API"

[extend]
useDefault = true

[allowlist]
description = """
sk_live_totallyfake — a deliberately invalid API key in tests/test_api_keys.py.
The test asserts the authentication layer rejects it with HTTP 401; the value's
entire purpose is to not work. `sk_live_` is this project's own key prefix, set
in apps/api_keys/models.py, which is why the Stripe rule takes an interest in it.

The test database credentials in config/settings/test.py and the matching
PostgreSQL service in .github/workflows/ci.yml are deliberately not listed here.
The scanner does not flag them, and adding unflagged values would leave entries
that quietly outlive whatever they were added for.
"""
regexTarget = "match"
regexes = [
  '''sk_live_totallyfake''',
]
