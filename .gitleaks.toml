# gitleaks configuration
#
# The default rule set is kept in full. The single global allowlist below exempts
# an explicitly enumerated set of literal values that are public BY DESIGN — test
# fixtures and documentation samples. Nothing here is, or has ever been, a real
# credential.
#
# Rule of thumb for changing this file: if a value could ever protect real data,
# it does not belong in an allowlist — rotate it instead.
#
# Why one `[allowlist]` table (and not `[[allowlists]]`): the plural,
# array-of-tables form is only understood by newer gitleaks releases. Older
# versions parse the file, silently ignore the unknown key, and report every
# allowlisted value as a leak. The singular form is understood by every 8.x
# release, so this config behaves identically in CI and on a developer machine.
# Matching is done on literal values rather than paths so that moving a file
# cannot silently widen the exemption.

title = "SaaS Backend API"

[extend]
useDefault = true

[allowlist]
description = """
Public-by-design values:

1. sk_live_totallyfake
   A deliberately invalid API key in tests/test_api_keys.py. The test asserts the
   authentication layer REJECTS it with HTTP 401 — the value's entire purpose is
   to not work. `sk_live_` is this project's own key prefix (apps/api_keys/models.py),
   which is why the generic secret rules take an interest in it.

2. ci-placeholder-not-a-real-secret / ci-postgres-password
   Throwaway credentials for the ephemeral PostgreSQL service container in
   .github/workflows/ci.yml. They exist only inside a CI runner that is destroyed
   at the end of the job and are unreachable from outside it.
"""
regexTarget = "match"
regexes = [
  '''sk_live_totallyfake''',
  '''ci-placeholder-not-a-real-secret''',
  '''ci-postgres-password''',
]
