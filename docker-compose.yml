# Local development stack.
#
#   cp .env.example .env && docker compose up --build
#
# Host port mappings are configurable so the stack can run alongside other
# projects that already use 5432/6379. Containers always talk to each other on
# the standard ports over the compose network; only your localhost mapping
# changes. Override in .env, e.g. POSTGRES_HOST_PORT=5442.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host-side only; override POSTGRES_HOST_PORT in .env if 5432 is taken.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILHOG_UI_PORT:-8025}:8025"   # Web UI

  web:
    build:
      context: .
      args:
        REQUIREMENTS: development
    env_file: .env
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - .:/app
    ports:
      - "${WEB_HOST_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "manage.py", "runserver", "0.0.0.0:8001"]

  worker:
    build:
      context: .
      args:
        REQUIREMENTS: development
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
      - postgres
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]

  beat:
    build:
      context: .
      args:
        REQUIREMENTS: development
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
      - postgres
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

volumes:
  postgres_data:
  redis_data:
