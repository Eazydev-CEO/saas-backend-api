name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.test

jobs:
  lint:
    name: Lint and static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements/development.txt
      - name: ruff
        run: ruff check --output-format=github .
      - name: Django system checks
        run: python manage.py check

  migrations:
    name: Migration consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements/development.txt
      - name: No missing migrations
        run: python manage.py makemigrations --check --dry-run

  test:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      # Matches the defaults in config/settings/test.py, so the suite needs no
      # configuration here. If this block and those defaults ever disagree, the
      # job fails loudly rather than testing something unintended.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_db
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U saas_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements/development.txt
      - name: Apply migrations
        run: python manage.py migrate --noinput
      - name: Run test suite
        run: pytest -q

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          # Pinned so the scanner cannot drift from the version .gitleaks.toml
          # is verified against.
          GITLEAKS_VERSION: "8.24.3"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet
          echo "docker-compose.yml is valid."
      - name: Build application image
        run: docker compose build web
